name: OMP adapter verification

on:
  push:
  pull_request:

jobs:
  focused:
    runs-on: windows-latest
    steps:
      - name: Check out adapter
        uses: actions/checkout@v4
        with:
          path: solarisael-house-omp
      - name: Check out canonical core sibling
        uses: actions/checkout@v4
        with:
          repository: solarisael/solarisael-house
          path: solarisael-house
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run focused adapter contract checks
        working-directory: solarisael-house-omp
        env:
          SOLARISAEL_HOUSE_CORE: ${{ github.workspace }}/solarisael-house
          SOLARISAEL_TEST_NATIVE_PYTHON: "1"
        run: bun test tests/adapter-contract.test.ts tests/runtime-smoke.test.ts tests/substrate-health.test.ts tests/portable-bundle.test.ts

  rust-binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            name: solarisael-house-substrate.exe
          - platform: linux-x64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: solarisael-house-substrate
          - platform: linux-arm64
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            name: solarisael-house-substrate
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: solarisael-house-omp
      - uses: actions/checkout@v4
        with:
          repository: solarisael/solarisael-house-substrate-rust
          path: solarisael-house-substrate-rust
      - name: Install aarch64 GNU linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
      - name: Build Rust substrate binary
        working-directory: solarisael-house-substrate-rust
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}
      - name: Stage platform binary
        shell: bash
        run: |
          mkdir -p solarisael-house-omp/bin/${{ matrix.platform }}
          cp solarisael-house-substrate-rust/target/${{ matrix.target }}/release/${{ matrix.name }} solarisael-house-omp/bin/${{ matrix.platform }}/${{ matrix.name }}
          if [[ "${{ matrix.platform }}" == linux-* ]]; then
            tar -czf solarisael-house-omp/bin/${{ matrix.platform }}.tar.gz -C solarisael-house-omp/bin/${{ matrix.platform }} "${{ matrix.name }}"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: rust-${{ matrix.platform }}
          path: ${{ startsWith(matrix.platform, 'linux-') && format('solarisael-house-omp/bin/{0}.tar.gz', matrix.platform) || format('solarisael-house-omp/bin/{0}/{1}', matrix.platform, matrix.name) }}
