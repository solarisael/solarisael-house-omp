<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Solarisael House</title><link rel="stylesheet" href="/style.css"></head>
<body><main><h1>Solarisael House</h1><p id="status">Connecting…</p>
<section><h2>Remember</h2><form data-method="remember"><input name="room" value="tuner" required><input name="kind" type="hidden" value="memory"><textarea name="body" maxlength="200000" required></textarea><input name="title" placeholder="Title" required><button>Remember</button></form></section>
<section><h2>Recall</h2><form data-method="recall"><input name="room" value="tuner" required><input name="query" required maxlength="2000"><button>Search</button></form><pre id="recall-results"></pre></section>
<section><h2>Anamnesis</h2><form data-method="anamnesis"><input name="room" value="tuner" required><select name="mode"><option value="wake">Wake</option><option value="consult">Consult</option></select><input name="query" placeholder="Question"><button>Consult</button></form><pre id="anamnesis-results"></pre>
<form data-method="anamnesis_write"><input name="operation" type="hidden" value="add"><input name="room" value="tuner" required><select name="kind"><option value="pillar">Pillar</option><option value="cycle">Cycle</option></select><select name="fidelity"><option value="record">Record</option><option value="raw-material">Raw material</option></select><select name="activation"><option value="wake">Wake</option><option value="fork">Fork</option></select><input name="title" placeholder="Title" required><textarea name="ramp" placeholder="Ramp" required></textarea><input name="verifyNote" placeholder="Verification note"><label><input name="allowEmptyCycle" type="checkbox" checked> Allow empty cycle</label><button>Add drawer</button></form>
<form data-method="anamnesis_write"><input name="operation" type="hidden" value="append-rep"><input name="room" value="tuner" required><input name="title" placeholder="Cycle title" required><input name="repNumber" type="number" min="1" value="1" required><textarea name="howItWent" placeholder="How it went" required></textarea><input name="portalPull" placeholder="Portal pull" required><input name="lighter" placeholder="What is lighter" required><button>Record repetition</button></form></section>
<section><h2>Cluster</h2><button id="cluster-check">Check</button><button id="cluster-dry">Dry run</button><button id="cluster-rebuild">Rebuild</button><pre id="cluster-results"></pre></section>
<section><h2>Backups</h2><button id="backup-create">Create backup</button><pre id="backup-results"></pre><form id="restore"><input name="manifest" placeholder="Manifest path" required><input name="targetDb" placeholder="Target database" required><input name="confirm" placeholder="Type RESTORE &lt;target database&gt;" required><button>Restore</button></form></section>
</main><script src="/app.js" defer></script></body></html>
